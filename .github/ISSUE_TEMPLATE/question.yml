name: "Question / discussion"
description: "Ask a question about VERDICT or start a discussion."
title: "[question] <short summary>"
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: What's on your mind?
      description: Your question or the topic you want to discuss.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        For **bugs in the code** or **build failures**, please file in the project repo instead
        (see the links in the [README](../../blob/main/README.md#project-links)). For **security
        issues**, do not post publicly — see [SECURITY.md](../../blob/main/SECURITY.md).
