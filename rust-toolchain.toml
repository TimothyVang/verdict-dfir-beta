# Pin the Rust toolchain so every CI + local invocation uses the
# same compiler. Matches Spec #2 §16 library pins + the L1 dev-base
# Dockerfile.

[toolchain]
# Rust 1.91 is the MSRV for YARA-X 1.19, which moves the in-process
# scanner off the advisory-affected Wasmtime 38 line.
channel = "1.91.0"
components = ["clippy", "rustfmt"]
profile = "minimal"
